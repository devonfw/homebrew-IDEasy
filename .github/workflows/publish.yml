# =============================================================================
# publish.yml — GitHub Actions workflow for Homebrew tap
# =============================================================================
# This workflow is auto-generated by `brew tap-new` and handles:
#   1. Building bottles when a PR is labeled with 'pr-pull'
#   2. Publishing those bottles to GitHub Releases
#
# To use:
#   - Push a PR that updates the formula
#   - Once CI is green, add the label 'pr-pull' to trigger bottle building
# =============================================================================

name: brew pr-pull

on:
  pull_request_target:
    types:
      - labeled

jobs:
  pr-pull:
    if: contains(github.event.pull_request.labels.*.name, 'pr-pull')
    runs-on: ubuntu-22.04
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Set up git
        uses: Homebrew/actions/git-user-config@master

      - name: Pull bottles
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
          PULL_REQUEST: ${{ github.event.pull_request.number }}
        run: brew pr-pull --debug --tap=${{ github.repository }} $PULL_REQUEST

      - name: Push commits
        uses: Homebrew/actions/git-try-push@master
        with:
          token: ${{ github.token }}
          branch: main
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
